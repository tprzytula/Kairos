name: Test Lambdas

on:
  push:
    paths:
      - "packages/lambdas/**"
      - ".github/workflows/test-lambdas.yml"
    paths-ignore:
      - "packages/lambdas/**/*.md"
      - "packages/lambdas/LICENSE"
  pull_request:
    paths:
      - "packages/lambdas/**"
      - ".github/workflows/test-lambdas.yml"
    paths-ignore:
      - "packages/lambdas/**/*.md"
      - "packages/lambdas/LICENSE"

concurrency:
  group: test-lambdas-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lambdas

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
      - name: Install Node.js and yarn
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: packages/lambdas/yarn.lock
      - name: Install Modules
        run: yarn
      - name: Lint
        run: yarn lint
      - name: Build
        run: yarn build
      - name: Test
        run: yarn test

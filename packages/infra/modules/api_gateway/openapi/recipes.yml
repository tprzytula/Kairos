openapi: 3.0.1
info:
  title: Recipes
  description: |
    API for Recipe Management
  version: "1.0"
paths:
  /recipes:
    get:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["get_recipes"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Recipes retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/recipe"
    put:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createRecipeRequest"
        required: true
      x-amazon-apigateway-request-validator: Validate body
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["add_recipe"].invoke_arn}
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
      responses:
        201:
          description: Recipe created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "recipe-123"
        400:
          description: Incorrect recipe details
    options:
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET, PUT'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /recipes/upload-url:
    get:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: query
          name: extension
          required: true
          schema:
            type: string
          description: File extension for the image (e.g. jpg, png)
          example: "jpg"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["get_recipe_upload_url"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Presigned upload URL and image path
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                  imagePath:
                    type: string
    options:
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /recipes/{id}:
    post:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the recipe to be updated
          example: "recipe-123"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/updateRecipeRequest"
        required: true
      x-amazon-apigateway-request-validator: Validate body
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["update_recipe"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Recipe updated successfully
        400:
          description: Incorrect recipe details
    delete:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the recipe to be removed
          example: "recipe-123"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["delete_recipe"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Recipe removed
        400:
          description: Invalid recipe ID
        404:
          description: Recipe does not exist
    options:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the recipe
          example: "recipe-123"
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'POST, DELETE'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
components:
  parameters:
    ProjectIDHeader:
      name: X-Project-ID
      in: header
      required: true
      schema:
        type: string
      description: Project ID for multi-tenancy data isolation
  schemas:
    recipeIngredient:
      title: Recipe Ingredient
      type: object
      required:
        - name
        - quantity
        - unit
      properties:
        name:
          type: string
          example: "Milk"
        quantity:
          type: number
          example: 2
        unit:
          type: string
          example: "liter(s)"
    recipe:
      title: Recipe Details
      type: object
      required:
        - id
        - projectId
        - name
        - ingredients
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: "recipe-123"
        projectId:
          type: string
          example: "project-456"
        name:
          type: string
          example: "Pasta Carbonara"
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/recipeIngredient"
        mealTypes:
          type: array
          items:
            type: string
          example: ["Dinner"]
        dishTypes:
          type: array
          items:
            type: string
          example: ["pasta"]
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
    createRecipeRequest:
      title: Create Recipe Request
      type: object
      required:
        - name
        - ingredients
      properties:
        name:
          type: string
          example: "Pasta Carbonara"
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/recipeIngredient"
          minItems: 1
        instructions:
          type: array
          items:
            type: string
          example: ["Boil water", "Cook pasta"]
        imagePath:
          type: string
          example: "https://cdn.example.com/user-uploads/recipes/abc.jpg"
        mealTypes:
          type: array
          items:
            type: string
          example: ["Dinner"]
        dishTypes:
          type: array
          items:
            type: string
          example: ["pasta"]
    updateRecipeRequest:
      title: Update Recipe Request
      type: object
      required:
        - id
      properties:
        id:
          type: string
          example: "recipe-123"
        name:
          type: string
          example: "Updated Recipe Name"
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/recipeIngredient"
        instructions:
          type: array
          items:
            type: string
          example: ["Boil water", "Cook pasta"]
        imagePath:
          type: string
          example: "https://cdn.example.com/user-uploads/recipes/abc.jpg"
        mealTypes:
          type: array
          items:
            type: string
          example: ["Dinner"]
        dishTypes:
          type: array
          items:
            type: string
          example: ["pasta"]
  securitySchemes:
    CognitoAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - ${cognito_user_pool_arn}
x-amazon-apigateway-request-validators:
  Validate body:
    validateRequestParameters: false
    validateRequestBody: true

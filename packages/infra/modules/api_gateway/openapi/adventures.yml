openapi: 3.0.1
info:
  title: Adventures
  description: |
    API for Adventures Management
  version: "1.0"
paths:
  /adventures:
    get:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["get_adventures"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Adventures retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/adventure"
    put:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createAdventureRequest"
        required: true
      x-amazon-apigateway-request-validator: Validate body
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["add_adventure"].invoke_arn}
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
      responses:
        201:
          description: Adventure created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "adventure-123"
        400:
          description: Incorrect adventure details
    options:
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET, PUT'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /adventures/{id}:
    post:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the adventure to be updated
          example: "adventure-123"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/updateAdventureRequest"
        required: true
      x-amazon-apigateway-request-validator: Validate body
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["update_adventure"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Adventure updated successfully
        400:
          description: Incorrect adventure details
    delete:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the adventure to be removed
          example: "adventure-123"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["delete_adventure"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Adventure removed
        400:
          description: Invalid adventure ID
        404:
          description: Adventure does not exist
    options:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the adventure
          example: "adventure-123"
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'POST, DELETE'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
components:
  parameters:
    ProjectIDHeader:
      name: X-Project-ID
      in: header
      required: true
      schema:
        type: string
      description: Project ID for multi-tenancy data isolation
  schemas:
    adventure:
      title: Adventure
      type: object
      required:
        - id
        - projectId
        - name
        - date
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: "adventure-123"
        projectId:
          type: string
          example: "project-456"
        name:
          type: string
          example: "Flight to Barcelona"
        date:
          type: string
          example: "2025-08-21"
        time:
          type: string
          example: "09:15"
        location:
          type: string
          example: "Heathrow T5"
        notes:
          type: string
          example: "Pack sunscreen"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
    createAdventureRequest:
      title: Create Adventure Request
      type: object
      required:
        - name
        - date
      properties:
        name:
          type: string
          example: "Flight to Barcelona"
        date:
          type: string
          example: "2025-08-21"
        time:
          type: string
          example: "09:15"
        location:
          type: string
          example: "Heathrow T5"
        notes:
          type: string
          example: "Pack sunscreen"
    updateAdventureRequest:
      title: Update Adventure Request
      type: object
      required:
        - id
      properties:
        id:
          type: string
          example: "adventure-123"
        name:
          type: string
          example: "Updated Adventure Name"
        date:
          type: string
          example: "2025-08-22"
        time:
          type: string
          nullable: true
          example: "10:00"
        location:
          type: string
          nullable: true
          example: "Madrid"
        notes:
          type: string
          nullable: true
          example: "Updated notes"
  securitySchemes:
    CognitoAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - ${cognito_user_pool_arn}
x-amazon-apigateway-request-validators:
  Validate body:
    validateRequestParameters: false
    validateRequestBody: true

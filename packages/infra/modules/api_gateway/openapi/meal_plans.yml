openapi: 3.0.1
info:
  title: Meal Plans
  description: |
    API for Meal Plan Management
  version: "1.0"
paths:
  /meal-plans:
    get:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["get_meal_plans"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Meal plans retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/mealPlan"
    put:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createMealPlanRequest"
        required: true
      x-amazon-apigateway-request-validator: Validate body
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["add_meal_plan"].invoke_arn}
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
      responses:
        201:
          description: Meal plan created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "meal-plan-123"
        400:
          description: Incorrect meal plan details
    options:
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET, PUT'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /meal-plans/upload-url:
    get:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: query
          name: extension
          required: true
          schema:
            type: string
          description: File extension for the image (e.g. jpg, png)
          example: "jpg"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["get_meal_plan_upload_url"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Presigned upload URL and image path
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                  imagePath:
                    type: string
    options:
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /meal-plans/{id}:
    post:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the meal plan to be updated
          example: "meal-plan-123"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/updateMealPlanRequest"
        required: true
      x-amazon-apigateway-request-validator: Validate body
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["update_meal_plan"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Meal plan updated successfully
        400:
          description: Incorrect meal plan details
    delete:
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the meal plan to be removed
          example: "meal-plan-123"
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: AWS_PROXY
        uri: ${lambda_functions["delete_meal_plan"].invoke_arn}
        passthroughBehavior: when_no_match
        contentHandling: CONVERT_TO_TEXT
      responses:
        200:
          description: Meal plan removed
        400:
          description: Invalid meal plan ID
        404:
          description: Meal plan does not exist
    options:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identifier of the meal plan
          example: "meal-plan-123"
      responses:
        200:
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'POST, DELETE'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
components:
  parameters:
    ProjectIDHeader:
      name: X-Project-ID
      in: header
      required: true
      schema:
        type: string
      description: Project ID for multi-tenancy data isolation
  schemas:
    mealPlan:
      title: Meal Plan
      type: object
      required:
        - id
        - projectId
        - date
        - recipeName
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: "meal-plan-123"
        projectId:
          type: string
          example: "project-456"
        date:
          type: string
          example: "2025-08-21"
        recipeName:
          type: string
          example: "Pasta Carbonara"
        recipeId:
          type: string
          example: "recipe-789"
        imagePath:
          type: string
          example: "https://cdn.example.com/user-uploads/meal-plans/abc.jpg"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
    createMealPlanRequest:
      title: Create Meal Plan Request
      type: object
      required:
        - date
        - recipeName
      properties:
        date:
          type: string
          example: "2025-08-21"
        recipeName:
          type: string
          example: "Pasta Carbonara"
        recipeId:
          type: string
          example: "recipe-789"
        imagePath:
          type: string
          example: "https://cdn.example.com/user-uploads/meal-plans/abc.jpg"
    updateMealPlanRequest:
      title: Update Meal Plan Request
      type: object
      required:
        - id
      properties:
        id:
          type: string
          example: "meal-plan-123"
        date:
          type: string
          example: "2025-08-22"
        recipeName:
          type: string
          example: "Updated Meal Name"
        recipeId:
          type: string
          nullable: true
          example: "recipe-789"
        mealType:
          type: string
          nullable: true
          example: "Dinner"
        imagePath:
          type: string
          nullable: true
          example: "https://cdn.example.com/user-uploads/meal-plans/abc.jpg"
  securitySchemes:
    CognitoAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - ${cognito_user_pool_arn}
x-amazon-apigateway-request-validators:
  Validate body:
    validateRequestParameters: false
    validateRequestBody: true

openapi: "3.0.1"
info:
  title: Projects API
  description: API for project management
  version: "1.0"
paths:
  /projects:
    get:
      summary: Get user's projects
      security:
        - CognitoAuthorizer: []
      responses:
        "200":
          description: "List of user's projects"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/project"
        "401":
          description: "Unauthorized"
        "500":
          description: "Internal server error"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "${lambda_functions.get_user_projects.invoke_arn}"
        passthroughBehavior: "when_no_match"
    post:
      summary: Create a new project
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createProjectRequest"
      responses:
        "201":
          description: "Project created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/projectWithRole"
        "400":
          description: "Invalid request"
        "401":
          description: "Unauthorized"
        "500":
          description: "Internal server error"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "${lambda_functions.create_project.invoke_arn}"
        passthroughBehavior: "when_no_match"
    options:
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET, POST'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /projects/members:
    get:
      summary: Get project members with profile details
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      responses:
        "200":
          description: "List of project members with profile details"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/projectMemberDetails"
        "400":
          description: "Project ID is required"
        "401":
          description: "Unauthorized"
        "500":
          description: "Internal server error"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "${lambda_functions.get_project_members_details.invoke_arn}"
        passthroughBehavior: "when_no_match"
    delete:
      summary: Leave a project
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
      responses:
        "200":
          description: "Successfully left the project"
        "400":
          description: "Cannot leave personal project"
        "401":
          description: "Unauthorized"
        "403":
          description: "Project owner cannot leave"
        "404":
          description: "Not a member of this project"
        "500":
          description: "Internal server error"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "${lambda_functions.leave_project.invoke_arn}"
        passthroughBehavior: "when_no_match"
    options:
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET, DELETE'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /projects/members/{userId}:
    delete:
      summary: Remove a member from a project (owner only)
      security:
        - CognitoAuthorizer: []
      parameters:
        - $ref: "#/components/parameters/ProjectIDHeader"
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Successfully removed member"
        "400":
          description: "Cannot remove the project owner or invalid request"
        "401":
          description: "Unauthorized"
        "403":
          description: "Only the project owner can remove members"
        "404":
          description: "Target user is not a member"
        "500":
          description: "Internal server error"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "${lambda_functions.remove_project_member.invoke_arn}"
        passthroughBehavior: "when_no_match"
    options:
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'DELETE'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /projects/join:
    post:
      summary: Join a project using invite code
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/joinProjectRequest"
      responses:
        "201":
          description: "Successfully joined project"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/projectWithRole"
        "400":
          description: "Invalid request"
        "401":
          description: "Unauthorized"
        "404":
          description: "Invalid invite code"
        "409":
          description: "Already a member"
        "500":
          description: "Internal server error"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "${lambda_functions.join_project.invoke_arn}"
        passthroughBehavior: "when_no_match"
    options:
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'POST'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
  /projects/invite/{inviteCode}:
    get:
      summary: Get project invite information
      parameters:
        - name: inviteCode
          in: path
          required: true
          schema:
            type: string
            pattern: "^[A-Z0-9]{6}$"
      responses:
        "200":
          description: "Project invite information"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/projectInviteInfo"
        "400":
          description: "Invalid invite code format"
        "404":
          description: "Invite code not found"
        "500":
          description: "Internal server error"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "${lambda_functions.get_project_invite_info.invoke_arn}"
        passthroughBehavior: "when_no_match"
    options:
      parameters:
        - name: inviteCode
          in: path
          required: true
          schema:
            type: string
            pattern: "^[A-Z0-9]{6}$"
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'GET'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Project-ID'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        passthroughBehavior: "when_no_match"
        type: "mock"
components:
  schemas:
    project:
      type: object
      required:
        - id
        - name
        - ownerId
        - createdAt
        - isPersonal
      properties:
        id:
          type: string
        name:
          type: string
        ownerId:
          type: string
        createdAt:
          type: number
        isPersonal:
          type: boolean
        inviteCode:
          type: string
        maxMembers:
          type: number
    projectWithRole:
      allOf:
        - $ref: "#/components/schemas/project"
        - type: object
          properties:
            userRole:
              type: string
              enum: [owner, member]
    createProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        isPersonal:
          type: boolean
    joinProjectRequest:
      type: object
      required:
        - inviteCode
      properties:
        inviteCode:
          type: string
          pattern: "^[A-Z0-9]{6}$"
    projectMemberDetails:
      type: object
      required:
        - userId
        - name
        - role
      properties:
        userId:
          type: string
        name:
          type: string
        givenName:
          type: string
        avatar:
          type: string
        role:
          type: string
          enum: [owner, member]
    projectInviteInfo:
      type: object
      required:
        - projectId
        - projectName
        - ownerName
        - memberCount
        - maxMembers
      properties:
        projectId:
          type: string
        projectName:
          type: string
        ownerName:
          type: string
        memberCount:
          type: number
        maxMembers:
          type: number
